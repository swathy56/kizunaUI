      // Aggressively unregister service workers to fix "Failed to fetch" errors
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            console.log('Aggressively unregistering SW:', registration.active?.scriptURL);
            registration.unregister();
          }
          // If we found and unregistered any, reload to get a clean state
          if (registrations.length > 0) {
            console.log('Service workers cleared, reloading...');
            window.location.reload();
          }
        });
      }
